name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v2
        with:
          version: "latest"
      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv pip install --system -e ".[eval]" 
      - name: Install lint extras
        run: uv pip install --system ruff
      - name: Ruff check
        run: ruff check src tests
      - name: Compile check
        run: python -m compileall -q src tests

  test:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v2
        with:
          version: "latest"
      - name: Install Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: uv pip install --system -e ".[eval]"
      - name: Install test extras
        run: uv pip install --system ruff pytest coverage[toml]
      - name: Run tests
        run: python -m pytest -q --tb=short
      - name: Coverage report
        run: |
          python -m coverage run -m pytest -q --tb=short
          python -m coverage report -m --include="src/reap/*" --fail-under=30
