name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Sync locked dependencies
        run: uv sync --locked --extra eval --group dev
      - name: Ruff
        run: uv run ruff check src tests
      - name: Compile
        run: uv run python -m compileall -q src tests
      - name: Tests with core coverage threshold
        run: |
          uv run coverage run -m pytest -q --tb=short
          uv run coverage report -m --include="src/reap/*" --fail-under=30
